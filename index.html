<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A little birthday surprise made just for you.">
<meta property="og:title" content="Happy Birthday!">
<meta property="og:description" content="Click and see the surprise 🎈">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">
<style>
  :root {
    --bg-deep: #2b0f2e;
    --bg-mid: #5b1a4a;
    --pink: #ff5fa2;
    --pink-soft: #ffb8d9;
    --gold: #ffd166;
    --cream: #fff7f0;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow-x: hidden;
    background: radial-gradient(ellipse at top, var(--bg-mid), var(--bg-deep) 70%);
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }

  #hearts-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .bg-heart {
    position: absolute;
    top: -10%;
    font-size: 22px;
    color: var(--pink);
    opacity: 0.55;
    animation-name: fall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    filter: drop-shadow(0 0 4px rgba(255,95,162,0.4));
  }

  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(115vh) rotate(25deg); }
  }

  main {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px 120px;
  }

  h1.title {
    font-family: 'Brush Script MT', 'Segoe Script', cursive;
    font-size: clamp(48px, 10vw, 96px);
    color: var(--cream);
    margin: 0;
    text-shadow: 0 0 20px rgba(255,183,217,0.5), 0 4px 12px rgba(0,0,0,0.35);
    letter-spacing: 1px;
  }

  p.feeling {
    font-size: clamp(14px, 2vw, 18px);
    color: var(--pink-soft);
    max-width: 480px;
    margin: 14px 0 40px;
    line-height: 1.6;
    font-style: italic;
  }

  .surprise-box {
    background: linear-gradient(160deg, #ff7ab0, #d63f8c);
    color: var(--cream);
    border: none;
    padding: 18px 46px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(214,63,140,0.45), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .surprise-box:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 12px 30px rgba(214,63,140,0.6), inset 0 1px 0 rgba(255,255,255,0.3);
  }

  .surprise-box:active {
    transform: translateY(0) scale(0.98);
  }

  .surprise-box.hidden-btn {
    opacity: 0;
    pointer-events: none;
  }

  #balloon-layer {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }

  .balloon-unit {
    position: absolute;
    bottom: -220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation-name: float-up;
    animation-timing-function: ease-in;
    animation-fill-mode: forwards;
  }

  .balloon-body {
    width: 60px;
    height: 74px;
    border-radius: 50% 50% 45% 45%;
    position: relative;
    box-shadow: inset -8px -8px 14px rgba(0,0,0,0.15), inset 8px 8px 14px rgba(255,255,255,0.25);
  }

  .balloon-body::after {
    content: "";
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 10px solid inherit;
  }

  .balloon-string {
    width: 2px;
    background: rgba(255,255,255,0.55);
  }

  .message-tag {
    margin-top: 4px;
    background: var(--cream);
    color: #b3306b;
    font-weight: 700;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 6px;
    white-space: nowrap;
    box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    position: relative;
  }

  .message-tag::before {
    content: "";
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-bottom: 6px solid var(--cream);
  }

  @keyframes float-up {
    0%   { bottom: -220px; transform: translateX(0) rotate(0deg); opacity: 1; }
    85%  { opacity: 1; }
    100% { bottom: 115vh; transform: translateX(var(--drift, 0px)) rotate(var(--sway, 0deg)); opacity: 0.95; }
  }

  footer.credit {
    position: relative;
    z-index: 1;
    text-align: center;
    color: rgba(255,255,255,0.35);
    font-size: 12px;
    padding-bottom: 18px;
  }
</style>
</head>
<body>

<div id="hearts-bg"></div>

<main>
  <h1 class="title">Happy Birthday ssv ❤️‍🩹</h1>
  <p class="feeling">  </p>
  <button class="surprise-box" id="surpriseBtn">Click Here</button>
</main>

<div id="balloon-layer"></div>

<footer class="credit">made with love</footer>

<script>
  // Falling hearts background
  const heartsBg = document.getElementById('hearts-bg');
  const heartCount = 28;
  for (let i = 0; i < heartCount; i++) {
    const h = document.createElement('div');
    h.className = 'bg-heart';
    h.textContent = '❤️';
    h.style.left = Math.random() * 100 + 'vw';
    const duration = 6 + Math.random() * 8;
    h.style.animationDuration = duration + 's';
    h.style.animationDelay = (Math.random() * duration) + 's';
    h.style.fontSize = (14 + Math.random() * 18) + 'px';
    h.style.opacity = 0.3 + Math.random() * 0.4;
    heartsBg.appendChild(h);
  }

  // Balloon burst on click
  const btn = document.getElementById('surpriseBtn');
  const balloonLayer = document.getElementById('balloon-layer');
  const colors = ['#ff6fa5', '#ffd166', '#7bd8c0', '#7fa8ff', '#c99bff', '#ff9770'];
  const messageWords = "Happy Birthday God Bless You".split(' ');

  let launched = false;

  btn.addEventListener('click', () => {
    if (launched) return;
    launched = true;
    btn.classList.add('hidden-btn');
    launchBalloons();
  });

  function launchBalloons() {
    const total = 7;
    for (let i = 0; i < total; i++) {
      setTimeout(() => createBalloon(i, total), i * 260);
    }
  }

  function createBalloon(index, total) {
    const unit = document.createElement('div');
    unit.className = 'balloon-unit';

    const spread = window.innerWidth * 0.7;
    const startX = (window.innerWidth / 2 - spread / 2) + (spread / total) * index + (Math.random() * 40 - 20);
    unit.style.left = startX + 'px';

    const drift = (Math.random() * 160 - 80) + 'px';
    const sway = (Math.random() * 16 - 8) + 'deg';
    unit.style.setProperty('--drift', drift);
    unit.style.setProperty('--sway', sway);

    const duration = 20 + Math.random() * 8;
    unit.style.animationDuration = duration + 's';

    const color = colors[index % colors.length];

    const body = document.createElement('div');
    body.className = 'balloon-body';
    body.style.background = `radial-gradient(circle at 30% 25%, ${lighten(color)}, ${color})`;

    const string = document.createElement('div');
    string.className = 'balloon-string';
    string.style.height = '55px';

    const tag = document.createElement('div');
    tag.className = 'message-tag';
    tag.textContent = messageWords[index] || '🎈';

    unit.appendChild(body);
    unit.appendChild(string);
    unit.appendChild(tag);
    balloonLayer.appendChild(unit);

    unit.addEventListener('animationend', () => unit.remove());
  }

  function lighten(hex) {
    // simple lighten helper for radial highlight
    const num = parseInt(hex.slice(1), 16);
    let r = (num >> 16) + 60, g = ((num >> 8) & 0x00FF) + 60, b = (num & 0x0000FF) + 60;
    r = Math.min(255, r); g = Math.min(255, g); b = Math.min(255, b);
    return `rgb(${r},${g},${b})`;
  }
</script>

</body>
</html>
